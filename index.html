<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Planning Grosbill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Manrope',-apple-system,system-ui,sans-serif;background:#EDEEF1;color:#16181D;-webkit-font-smoothing:antialiased;}
  input,button,select{font-family:inherit;}
  ::-webkit-scrollbar{height:10px;width:10px;}
  ::-webkit-scrollbar-thumb{background:#CFD3D8;border-radius:8px;}
  .gb-num{font-family:'Space Grotesk','Manrope',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.5px;}
  .gb-eyebrow{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#D81E2C;}
  h2{margin:0;}
  .gb-card{background:#fff;border:1px solid #E4E7EB;border-radius:14px;padding:22px 24px;margin-bottom:20px;box-shadow:0 1px 2px rgba(16,24,40,.04),0 10px 26px -18px rgba(16,24,40,.14);transition:background-color .28s ease,border-color .22s ease,box-shadow .25s ease;}
  .gb-card:hover{box-shadow:0 2px 4px rgba(16,24,40,.05),0 16px 38px -18px rgba(16,24,40,.18);}
  .gb-kpi{position:relative;background:#fff;border:1px solid #E4E7EB;border-radius:14px;padding:16px 18px;overflow:hidden;box-shadow:0 1px 2px rgba(16,24,40,.04),0 8px 22px -16px rgba(16,24,40,.16);transition:transform .2s cubic-bezier(.34,1.4,.5,1),box-shadow .22s ease;}
  .gb-kpi:hover{transform:translateY(-2px);box-shadow:0 14px 28px -16px rgba(16,24,40,.24);}
  input{transition:background-color .25s ease,border-color .18s ease,color .25s ease,box-shadow .16s ease;}
  button{transition:transform .16s cubic-bezier(.34,1.4,.5,1),background-color .2s ease,box-shadow .22s ease,filter .2s ease,border-color .2s ease;}
  button:active{transform:scale(.95);}
  .gb-action:not(:active):hover{transform:translateY(-1.5px);box-shadow:0 8px 18px -6px rgba(216,30,44,.42);}
  .gb-action:not(:active):active{transform:translateY(0) scale(.97);}
  .gb-lift:not(:active):hover{transform:translateY(-1.5px);box-shadow:0 8px 18px -6px rgba(16,24,40,.28);}
  .gb-lift:not(:active):active{transform:translateY(0) scale(.97);}
  .gb-ghost-light:not(:active):hover{box-shadow:0 3px 11px rgba(16,24,40,.12);}
  .gb-mini:hover,.gb-dash:hover{filter:brightness(.97);border-color:#C9CDD4;}
  .gb-ghost:hover{background:#FDECEC !important;border-color:#F1B9B9 !important;color:#B71722 !important;}
  .cell-box{transition:border-color .18s ease,box-shadow .18s ease;}
  .cell-box:hover{box-shadow:inset 0 0 0 1px rgba(216,30,44,.18);}
  main input:focus{box-shadow:0 0 0 3px rgba(216,30,44,.16);border-color:#D81E2C !important;outline:none;}
  .gb-topbar input:focus{box-shadow:0 0 0 3px rgba(216,30,44,.14);border-color:#D81E2C !important;background:#fff;outline:none;}
  @keyframes gb-slidedown{from{opacity:0;transform:translateY(-9px);}to{opacity:1;transform:translateY(0);}}
  @keyframes gb-rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .gb-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;animation:gb-rise .45s cubic-bezier(.16,1,.3,1);}
  @media (max-width:1080px){ .gb-kpis{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:600px){ .gb-kpis{grid-template-columns:1fr;} .gb-topbar{flex-wrap:wrap;} }
  @media (prefers-reduced-motion: reduce){
    *,.gb-card,.gb-kpi,button,input,.cell-box{transition:none !important;animation:none !important;}
    button:active,.gb-kpi:hover{transform:none !important;}
  }
  /* DARK — inline light styles need !important to be overridden */
  body.gb-dark{background:#0F1013 !important;}
  body.gb-dark main{color:#E6E7EA;}
  body.gb-dark .gb-topbar{background:#16181c !important;border-color:#26282e !important;box-shadow:0 1px 0 rgba(0,0,0,.4) !important;}
  body.gb-dark .gb-topbar input{color:#EDEEF0 !important;}
  body.gb-dark .gb-store{color:#F3F4F6 !important;}
  body.gb-dark .gb-topbar span{color:#aeb4bc !important;}
  body.gb-dark .gb-themebtn{background:#26282e !important;color:#cfd2d7 !important;border-color:#3a3e45 !important;}
  body.gb-dark .gb-divider{background:#2b2e34 !important;}
  body.gb-dark .gb-card{background:#1b1d22 !important;border-color:#2b2e34 !important;box-shadow:none !important;}
  body.gb-dark .gb-card:hover{box-shadow:0 0 0 1px #34383f !important;}
  body.gb-dark .gb-kpi{background:#1b1d22 !important;border-color:#2b2e34 !important;}
  body.gb-dark .gb-kpi .gb-num{color:#F3F4F6 !important;}
  body.gb-dark .gb-sub{color:#9aa0a8 !important;}
  body.gb-dark .gb-eyebrow{color:#E8838E !important;}
  body.gb-dark h2{color:#EDEEF0 !important;}
  body.gb-dark main input{background:#26282e !important;border-color:#3a3e45 !important;color:#EDEEF0 !important;}
  body.gb-dark main label{color:#cfd2d7 !important;}
  body.gb-dark th{background:#16181c !important;border-color:#2b2e34 !important;color:#cfd2d7 !important;}
  body.gb-dark th div,body.gb-dark th span,body.gb-dark th label{color:#cfd2d7 !important;}
  body.gb-dark tbody td{background:#1b1d22 !important;border-color:#2b2e34 !important;}
  body.gb-dark tbody td div{color:#E6E7EA;}
  body.gb-dark .gb-stickycol{background:#16181c !important;}
  body.gb-dark .cell-box{background:#202329 !important;}
  body.gb-dark .gb-twrap{border-color:#2b2e34 !important;}
  body.gb-dark .gb-hr{border-color:#2b2e34 !important;}
  body.gb-dark .gb-soft{background:#26282e !important;border-color:#3a3e45 !important;color:#aeb4bc !important;}
  body.gb-dark .gb-mini{background:#26282e !important;border-color:#3a3e45 !important;color:#cfd2d7 !important;}
  body.gb-dark .gb-addbtn{background:linear-gradient(180deg,#3a3f48,#2b2f36) !important;}
  body.gb-dark .gb-ghost{border-color:#3a3e45 !important;color:#9aa0a8 !important;}
  body.gb-dark .gb-dash{border-color:#3a3e45 !important;color:#9aa0a8 !important;}
  body.gb-dark .gb-footer{color:#6b7077 !important;}
</style>
</head>

const DAYS=[{name:'Lundi',short:'Lun'},{name:'Mardi',short:'Mar'},{name:'Mercredi',short:'Mer'},{name:'Jeudi',short:'Jeu'},{name:'Vendredi',short:'Ven'},{name:'Samedi',short:'Sam'},{name:'Dimanche',short:'Dim'}];
const TOL=30;
const pad=n=>String(n).padStart(2,'0');
const toMin=t=>{ if(!t)return null; const m=/^(\d{1,2}):(\d{2})$/.exec(t); if(!m)return null; const h=+m[1],mm=+m[2]; if(h>23||mm>59)return null; return h*60+mm; };
const fmtClock=m=>pad(Math.floor(m/60))+'h'+pad(m%60);
const fmtDur=m=>{const s=m<0?'-':'';const a=Math.abs(m);return s+Math.floor(a/60)+'h'+pad(a%60);};
const DEFAULT_HOURS=()=>{const w={m1:'10:00',m2:'12:30',a1:'13:30',a2:'19:00'};return [{...w},{...w},{...w},{...w},{...w},{...w},{m1:'10:00',m2:'12:30',a1:'14:30',a2:'19:00'}];};
const daySegs=h=>{const o=[];if(!h)return o;const a=toMin(h.m1),b=toMin(h.m2),c=toMin(h.a1),d=toMin(h.a2);if(a!=null&&b!=null&&a<b)o.push([a,b]);if(c!=null&&d!=null&&c<d)o.push([c,d]);return o;};
const inSegs=(segs,s,e)=>segs.some(([a,b])=>s>=a&&e<=b);
const hoursLabel=h=>{const s=daySegs(h);return s.length?s.map(([a,b])=>fmtClock(a)+'–'+fmtClock(b)).join(' · '):'Fermé';};
function mergeIv(mins){ if(!mins.length)return[]; mins.sort((a,b)=>a-b); const out=[]; let st=mins[0],pr=mins[0]; for(let i=1;i<mins.length;i++){ if(mins[i]===pr+5){pr=mins[i];} else {out.push([st,pr+5]);st=mins[i];pr=mins[i];} } out.push([st,pr+5]); return out; }
function cellErr(raw,segs){ const sh=raw.map(s=>({s:toMin(s.start),e:toMin(s.end)})); for(const x of sh){ if(x.s==null||x.e==null||x.s>=x.e)return true; if(!inSegs(segs,x.s,x.e))return true; } for(let i=0;i<sh.length;i++)for(let j=i+1;j<sh.length;j++){ if(sh[i].s!=null&&sh[j].s!=null&&sh[i].s<sh[j].e&&sh[j].s<sh[i].e)return true; } return false; }
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const SAVE_KEY='grosbill-planning-v3';

const K=()=>[{start:'10:00',end:'11:30'},{start:'13:30',end:'19:00'}];
const H=()=>[{start:'10:00',end:'12:30'},{start:'14:30',end:'19:00'}];

let S={
  storeName:'Grosbill Sainte Geneviève des Bois',
  periodText:'du 16 au 22 juin 2026',
  openDays:[false,true,true,true,true,true,true],
  hours:DEFAULT_HOURS(),
  hoursOpen:false,
  teamOpen:true,
  nextId:5,
  configured:false,
  lastSaved:null,
  employees:[
    {id:1,name:'JANQUIN Marc',contract:35,soloOk:true,absent:true,restDays:[6],schedule:{}},
    {id:2,name:'OLLIVIER AMAURY',contract:35,soloOk:true,vacation:true,restDays:[6],schedule:{}},
    {id:4,name:'MOINDRON HERVE',contract:35,soloOk:true,restDays:[0,4],schedule:{1:H(),2:H(),3:H(),5:H(),6:H()}},
    {id:3,name:'KILLYANN',contract:35,soloOk:false,restDays:[0,6],schedule:{1:K(),2:K(),3:K(),4:K(),5:K()}}
  ]
};
let DARK=false;

// --- Stockage robuste : IndexedDB (durable, ex. Firefox) + localStorage (cache rapide) ---
const IDB={
  db:null,
  open(){ return new Promise(res=>{ try{ const r=indexedDB.open('grosbill-planning',1); r.onupgradeneeded=()=>{ const db=r.result; if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv'); }; r.onsuccess=()=>res(r.result); r.onerror=()=>res(null); }catch(e){ res(null); } }); },
  async ready(){ if(this.db)return this.db; this.db=await this.open(); return this.db; },
  async get(key){ const db=await this.ready(); if(!db)return null; return new Promise(res=>{ try{ const rq=db.transaction('kv','readonly').objectStore('kv').get(key); rq.onsuccess=()=>res(rq.result==null?null:rq.result); rq.onerror=()=>res(null); }catch(e){ res(null); } }); },
  async set(key,val){ const db=await this.ready(); if(!db)return false; return new Promise(res=>{ try{ const tx=db.transaction('kv','readwrite'); tx.objectStore('kv').put(val,key); tx.oncomplete=()=>res(true); tx.onerror=()=>res(false); }catch(e){ res(false); } }); },
  async del(key){ const db=await this.ready(); if(!db)return; try{ db.transaction('kv','readwrite').objectStore('kv').delete(key); }catch(e){} }
};
function applyState(d){
  if(!d)return;
  if(d.storeName!=null)S.storeName=d.storeName;
  if(d.periodText!=null)S.periodText=d.periodText;
  if(Array.isArray(d.openDays))S.openDays=d.openDays;
  if(Array.isArray(d.hours))S.hours=d.hours;
  if(Array.isArray(d.employees))S.employees=d.employees;
  if(d.nextId!=null)S.nextId=d.nextId;
  if(d.configured!=null)S.configured=d.configured;
  if(d.savedAt)S.lastSaved=d.savedAt;
}
function snapshot(){ return {storeName:S.storeName,periodText:S.periodText,openDays:S.openDays,hours:S.hours,employees:S.employees,nextId:S.nextId,configured:S.configured,savedAt:Date.now()}; }
function load(){
  // Lecture synchrone du cache localStorage : affichage instantané
  try{ const raw=localStorage.getItem(SAVE_KEY); if(raw){ const d=JSON.parse(raw); applyState(d); if(d.configured==null)S.configured=true; } }catch(e){}
  try{ if(localStorage.getItem('grosbill-theme')==='dark')DARK=true; }catch(e){}
}
async function loadFromIDB(){
  // IndexedDB = source de vérité durable. On l'applique si elle est au moins aussi récente.
  try{
    const d=await IDB.get('planning');
    if(d){
      if(!S.lastSaved || (d.savedAt||0)>=(S.lastSaved||0)){ applyState(d); if(d.configured==null)S.configured=true; render(); }
    } else if(S.lastSaved){
      // Migration : on recopie les données localStorage existantes dans IndexedDB
      IDB.set('planning',snapshot());
    }
  }catch(e){}
}
function persist(){
  const snap=snapshot();
  S.lastSaved=snap.savedAt;
  try{ localStorage.setItem(SAVE_KEY,JSON.stringify(snap)); }catch(e){}
  try{ IDB.set('planning',snap); }catch(e){}
}
function commit(){ persist(); render(); }
function empById(id){ return S.employees.find(e=>e.id===id); }

function computeVM(){
  const {employees,openDays}=S;
  const hours=S.hours||DEFAULT_HOURS();
  const segsByDay=DAYS.map((d,di)=>daySegs(hours[di]));
  const alerts=[];
  employees.forEach(emp=>{
    if(emp.vacation||emp.absent)return;
    DAYS.forEach((d,di)=>{
      if(!openDays[di]||emp.restDays.includes(di))return;
      const raw=emp.schedule[di]||[];
      const sh=raw.map(s=>({s:toMin(s.start),e:toMin(s.end),r:s}));
      sh.forEach(x=>{
        if(x.s==null||x.e==null||x.s>=x.e){alerts.push({lvl:'err',text:(emp.name||'Sans nom')+' · '+d.name+' : horaire invalide'});return;}
        if(!inSegs(segsByDay[di],x.s,x.e)){alerts.push({lvl:'err',text:(emp.name||'Sans nom')+' · '+d.name+' : créneau hors horaires magasin ('+x.r.start+'–'+x.r.end+')'});}
      });
      for(let i=0;i<sh.length;i++)for(let j=i+1;j<sh.length;j++){ if(sh[i].s!=null&&sh[j].s!=null&&sh[i].s<sh[j].e&&sh[j].s<sh[i].e){alerts.push({lvl:'err',text:(emp.name||'Sans nom')+' · '+d.name+' : chevauchement de créneaux'});} }
    });
  });
  DAYS.forEach((d,di)=>{
    if(!openDays[di])return;
    const segs=segsByDay[di]; if(!segs.length)return;
    const open0=segs[0][0], close0=segs[segs.length-1][1];
    const mS=open0, mE=Math.min(open0+60,close0), eS=Math.max(close0-60,open0), eE=close0;
    const gaps=[],alone=[]; let aname='';
    segs.forEach(([a,b])=>{
      for(let t=a;t<b;t+=5){
        const pres=employees.filter(emp=>!emp.vacation&&!emp.absent&&!emp.restDays.includes(di)&&(emp.schedule[di]||[]).some(s=>{const ss=toMin(s.start),ee=toMin(s.end);return ss!=null&&ee!=null&&ss<=t&&t<ee;}));
        if(pres.length===0)gaps.push(t);
        const mw=t>=mS&&t<mE, ew=t>=eS&&t<eE;
        if((mw||ew)&&pres.length===1&&!pres[0].soloOk){alone.push(t);aname=pres[0].name||'Sans nom';}
      }
    });
    mergeIv(gaps).forEach(iv=>alerts.push({lvl:'err',text:d.name+' : aucune présence en magasin '+fmtClock(iv[0])+'–'+fmtClock(iv[1])}));
    mergeIv(alone).forEach(iv=>alerts.push({lvl:'block',text:d.name+' : '+aname+' seul(e) en magasin '+fmtClock(iv[0])+'–'+fmtClock(iv[1])+' sans habilitation'}));
  });
  const blockingCount=alerts.filter(a=>a.lvl==='block').length;
  alerts.sort((a,b)=>(a.lvl==='block'?0:1)-(b.lvl==='block'?0:1));

  let grandTotalMin=0,conformCount=0,activeCount=0,awayCount=0;
  const emps=employees.map(emp=>{
    const cp=!!emp.vacation, abs=!!emp.absent, vac=cp||abs;
    const awayLabel=cp?'Congé':'Absent';
    const awayColor=cp?'#B5670B':'#B71722';
    const awayBorder=cp?'#F2D8A8':'#F1B9B9';
    const contractMin=emp.contract*60;
    let total=0;
    if(!vac)DAYS.forEach((d,di)=>{ if(!openDays[di]||emp.restDays.includes(di))return; (emp.schedule[di]||[]).forEach(s=>{const ss=toMin(s.start),ee=toMin(s.end); if(ss!=null&&ee!=null&&ee>ss)total+=ee-ss;}); });
    const diff=total-contractMin, ad=Math.abs(diff);
    const st=ad<=TOL?'green':ad<=120?'orange':'red';
    const sc={green:{bg:'#E7F5EC',c:'#1E8E3E',b:'#B6E0C4'},orange:{bg:'#FDF2E3',c:'#B5670B',b:'#F2D8A8'},red:{bg:'#FDECEC',c:'#B71722',b:'#F1B9B9'}}[st];
    const diffLabel=diff===0?'OK':(diff>0?'+':'')+fmtDur(diff);
    if(vac){awayCount++;}else{activeCount++;grandTotalMin+=total;if(st==='green')conformCount++;}
    const cells=DAYS.map((d,di)=>{
      const open=openDays[di], rest=emp.restDays.includes(di), raw=emp.schedule[di]||[];
      const err=!vac&&open&&!rest&&cellErr(raw,segsByDay[di]);
      const printText=cp?'Congé':abs?'Absent':!open?'Fermé':rest?'Repos':(raw.length?raw.map(s=>s.start+'–'+s.end).join('\n'):'—');
      return {away:vac,awayLabel,awayColor,closed:!vac&&!open,rest:!vac&&open&&rest,editable:!vac&&open&&!rest,shifts:raw,di,borderColor:vac?awayBorder:err?'#D81E2C':(DARK?'#2f3239':'#E4E7EB'),printText};
    });
    return {id:emp.id,name:emp.name,displayName:emp.name||'Sans nom',contract:emp.contract,contractLabel:fmtDur(contractMin),soloOk:emp.soloOk,vac,cp,abs,restDays:emp.restDays,
      cpBg:cp?'#FDF2E3':(DARK?'#26282e':'#fff'), cpColor:cp?'#B5670B':'#8A9099', cpBorder:cp?'#F2D8A8':(DARK?'#3a3e45':'#E4E7EB'),
      absBg:abs?'#FDECEC':(DARK?'#26282e':'#fff'), absColor:abs?'#B71722':'#8A9099', absBorder:abs?'#F1B9B9':(DARK?'#3a3e45':'#E4E7EB'),
      totalLabel:cp?'En congé':abs?'Absent':fmtDur(total), diffLabel:vac?'':diffLabel,
      statusBg:vac?(cp?'#FDF2E3':'#FDECEC'):sc.bg, statusColor:vac?awayColor:sc.c, statusBorder:vac?awayBorder:sc.b,
      cells};
  });
  const days=DAYS.map((d,di)=>{const h=hours[di]||{};return {short:d.short,full:d.name,open:openDays[di],di,
    headBg:openDays[di]?(DARK?'#16181c':'#fff'):(DARK?'#16181c':'#F0F1F3'),headColor:openDays[di]?(DARK?'#EDEEF0':'#1A1D21'):'#A0A5AC',
    hoursLabel:openDays[di]?hoursLabel(h):'Fermé', m1:h.m1,m2:h.m2,a1:h.a1,a2:h.a2, rowOpacity:openDays[di]?'1':'0.55'};});

  const kpis={
    staff:String(employees.length),
    staffSub:(awayCount>0?(activeCount+' actif'+(activeCount>1?'s':'')+' · '+awayCount+(awayCount>1?' absents':' absent')):(employees.length?'tous présents':'aucun employé')),
    hours:fmtDur(grandTotalMin),
    conform:(activeCount?(conformCount+'/'+activeCount):'—'),
    conformBar:((activeCount>0&&conformCount===activeCount)?'#2BB673':'#E8830C'),
    alerts:String(alerts.length),
    alertsSub:(blockingCount>0?(blockingCount+' bloquant'+(blockingCount>1?'s':'')):(alerts.length?'à vérifier':'tout est conforme')),
    alertBar:(blockingCount>0?'#D81E2C':(alerts.length?'#E8830C':'#2BB673')),
    alertColor:(blockingCount>0?'#D81E2C':(alerts.length?'#B5670B':'#16181D'))
  };
  const alertVm=alerts.map(a=>({text:a.text, blocking:a.lvl==='block', bg:a.lvl==='block'?'#FDECEC':'#FFF7ED', border:a.lvl==='block'?'#F1B9B9':'#FBD9AE', dot:a.lvl==='block'?'#D81E2C':'#E8830C'}));
  return {emps,days,kpis,alerts:alertVm,blockingCount};
}

}

function downloadBackup(){
  try{
    persist();
    const data={storeName:S.storeName,periodText:S.periodText,openDays:S.openDays,hours:S.hours,employees:S.employees,nextId:S.nextId,savedAt:Date.now(),_app:'grosbill-planning',_v:3};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const safe=(S.storeName||'planning').replace(/[^a-z0-9]+/gi,'-').replace(/^-+|-+$/g,'').toLowerCase()||'magasin';
    a.href=url; a.download='planning-'+safe+'.json';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ try{document.body.removeChild(a);}catch(e){} URL.revokeObjectURL(url); },120);
  }catch(e){ alert('Impossible d\u2019enregistrer le fichier : '+e.message); }
}
function applyBackup(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(d._app&&d._app!=='grosbill-planning'){ if(!confirm('Ce fichier ne semble pas \u00eatre un planning Grosbill. Le charger quand m\u00eame ?'))return; }
      if(d.storeName!=null)S.storeName=d.storeName;
      if(d.periodText!=null)S.periodText=d.periodText;
      if(Array.isArray(d.openDays))S.openDays=d.openDays;
      if(Array.isArray(d.hours))S.hours=d.hours;
      if(Array.isArray(d.employees))S.employees=d.employees;
      if(d.nextId!=null)S.nextId=d.nextId;
      persist(); render();
      alert('Planning charg\u00e9 avec succ\u00e8s.');
    }catch(e){ alert('Fichier invalide ou illisible : '+e.message); }
  };
  r.onerror=()=>alert('Impossible de lire le fichier.');
  r.readAsText(file);
}

    h+='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:7px 0;border-bottom:1px solid #F0F1F3;">';
    h+='<label style="display:flex;align-items:center;gap:7px;width:120px;font-size:13px;font-weight:700;color:#16181D;cursor:pointer;"><input data-su="openday" data-di="'+di+'" type="checkbox" '+(open?'checked':'')+' style="width:16px;height:16px;accent-color:#D81E2C;"/>'+d.name+'</label>';
    if(open){
      const f=(field,ph)=>'<input data-su="hour" data-di="'+di+'" data-field="'+field+'" value="'+esc(hh[field]||'')+'" placeholder="'+ph+'" style="'+inp+'width:62px;text-align:center;padding:8px 4px;"/>';
      h+='<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:12px;color:#8A9099;">';
      h+=f('m1','10:00')+'<span>–</span>'+f('m2','12:30')+'<span style="margin:0 4px;color:#C9CDD4;">|</span>'+f('a1','14:00')+'<span>–</span>'+f('a2','19:00');
      h+='</div>';
    } else { h+='<span style="font-size:13px;color:#B0B5BC;font-style:italic;">Fermé</span>'; }
    h+='</div>';
  });
  h+='</div></div>';

  h+='<button data-su="finish" class="gb-action" style="width:100%;margin-top:6px;padding:14px;background:#D81E2C;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.2px;">Démarrer le planning</button>';
  h+='</div>';
  app.innerHTML=h;
}

function finishSetup(){
  const name=SETUP.store==='__custom'?(SETUP.custom.trim()||'Mon magasin'):SETUP.store;
  S.storeName=name;
  S.openDays=SETUP.openDays.slice();
  S.hours=SETUP.hours.map(h=>({...h}));
  const emps=SETUP.emps.filter(e=>e.name.trim()).map(e=>({id:S.nextId++,name:e.name.trim(),contract:isNaN(parseFloat(e.contract))?35:parseFloat(e.contract),soloOk:!!e.soloOk,restDays:[6],schedule:{}}));
  S.employees=emps;
  S.configured=true;
  S.teamOpen=true;
  persist(); render();
}

// Gestion des interactions de l'assistant de configuration
app && app.addEventListener('click',e=>{
  const t=e.target.closest('[data-su]'); if(!t||S.configured)return;
  const su=t.getAttribute('data-su');
  const i=t.hasAttribute('data-i')?+t.getAttribute('data-i'):null;
  if(t.tagName==='INPUT'&&su!=='openday'&&su!=='esolo')return;
  switch(su){
    case 'addemp': SETUP.emps.push({name:'',contract:35,soloOk:false}); renderSetup(); break;
    case 'rmemp': SETUP.emps.splice(i,1); if(!SETUP.emps.length)SETUP.emps.push({name:'',contract:35,soloOk:false}); renderSetup(); break;
    case 'esolo': SETUP.emps[i].soloOk=t.checked; break;
    case 'openday': SETUP.openDays[i==null?+t.getAttribute('data-di'):i]=t.checked; renderSetup(); break;
    case 'finish': finishSetup(); break;
  }
});
app && app.addEventListener('change',e=>{
  const t=e.target.closest('[data-su]'); if(!t||S.configured)return;
  const su=t.getAttribute('data-su');
  if(su==='store'){ SETUP.store=t.value; renderSetup(); }
});
app && app.addEventListener('input',e=>{
  const t=e.target.closest('[data-su]'); if(!t||S.configured)return;
  const su=t.getAttribute('data-su');
  const i=t.hasAttribute('data-i')?+t.getAttribute('data-i'):null;
  switch(su){
    case 'custom': SETUP.custom=t.value; break;
    case 'ename': SETUP.emps[i].name=t.value; break;
    case 'econtract': SETUP.emps[i].contract=t.value; break;
    case 'hour': { const di=+t.getAttribute('data-di'),field=t.getAttribute('data-field'); SETUP.hours[di]={...SETUP.hours[di],[field]:t.value}; break; }
  }
});

// EVENTS
app.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]'); if(!t)return;
  const act=t.getAttribute('data-act');
  const id=t.hasAttribute('data-id')?+t.getAttribute('data-id'):null;
  const di=t.hasAttribute('data-di')?+t.getAttribute('data-di'):null;
  const si=t.hasAttribute('data-si')?+t.getAttribute('data-si'):null;
  if(t.tagName==='INPUT')return; // inputs handled on change
  switch(act){
    case 'addEmp': S.employees.push({id:S.nextId++,name:'',contract:35,soloOk:false,restDays:[6],schedule:{}}); commit(); break;
    case 'up': { const i=S.employees.findIndex(x=>x.id===id); if(i>0){const a=S.employees;[a[i-1],a[i]]=[a[i],a[i-1]];commit();} break; }
    case 'down': { const i=S.employees.findIndex(x=>x.id===id); if(i>=0&&i<S.employees.length-1){const a=S.employees;[a[i+1],a[i]]=[a[i],a[i+1]];commit();} break; }
    case 'rest': { const emp=empById(id); emp.restDays=emp.restDays.includes(di)?emp.restDays.filter(x=>x!==di):[...emp.restDays,di]; commit(); break; }
    case 'vac': { const emp=empById(id); emp.vacation=!emp.vacation; if(emp.vacation)emp.absent=false; commit(); break; }
    case 'abs': { const emp=empById(id); emp.absent=!emp.absent; if(emp.absent)emp.vacation=false; commit(); break; }
    case 'rmEmp': { const emp=empById(id); if(confirm('Retirer '+(emp.name||'cet employé')+' du planning ?\n\nCette action est définitive.')){ S.employees=S.employees.filter(x=>x.id!==id); commit(); } break; }
    case 'addShift': { const emp=empById(id); const a=emp.schedule[di]||[]; emp.schedule[di]=[...a, a.length?{start:'13:30',end:'19:00'}:{start:'10:00',end:'12:30'}]; commit(); break; }
    case 'rmShift': { const emp=empById(id); emp.schedule[di]=(emp.schedule[di]||[]).filter((_,k)=>k!==si); commit(); break; }
    case 'doorsign': { const w=window.open('','_blank'); if(!w){alert('Veuillez autoriser les fenêtres pop-up pour ouvrir l\'affiche dans un nouvel onglet.');return;} w.document.open(); w.document.write(buildDoorSignHTML()); w.document.close(); break; }
    case 'toggleTeam': S.teamOpen=!S.teamOpen; render(); break;
    case 'toggleHours': S.hoursOpen=!S.hoursOpen; render(); break;
    case 'reset': if(confirm('Effacer le planning enregistré et revenir à l\'exemple de départ ?')){ try{localStorage.removeItem(SAVE_KEY);}catch(e){} try{IDB.del('planning');}catch(e){} location.reload(); } break;
    case 'dark': DARK=!DARK; try{localStorage.setItem('grosbill-theme',DARK?'dark':'light');}catch(e){} render(); break;
    case 'export': { const w=window.open('','_blank'); if(!w){alert('Veuillez autoriser les fenêtres pop-up pour ouvrir le PDF dans un nouvel onglet.');return;} w.document.open(); w.document.write(buildExportHTML()); w.document.close(); break; }
  }
});
app.addEventListener('change',e=>{
  const t=e.target.closest('[data-act]'); if(!t)return;
  const act=t.getAttribute('data-act');
  const id=t.hasAttribute('data-id')?+t.getAttribute('data-id'):null;
  const di=t.hasAttribute('data-di')?+t.getAttribute('data-di'):null;
  const si=t.hasAttribute('data-si')?+t.getAttribute('data-si'):null;
  const field=t.getAttribute('data-field');
  switch(act){
    case 'store': S.storeName=t.value; commit(); break;
    case 'period': S.periodText=t.value; commit(); break;
    case 'name': { const emp=empById(id); emp.name=t.value; commit(); break; }
    case 'contract': { const emp=empById(id); const n=parseFloat(t.value); emp.contract=isNaN(n)?0:n; commit(); break; }
    case 'solo': { const emp=empById(id); emp.soloOk=t.checked; commit(); break; }
    case 'openday': S.openDays=S.openDays.map((o,i)=>i===di?t.checked:o); commit(); break;
    case 'hour': { const v=normTime(t.value); t.value=v; S.hours=(S.hours||DEFAULT_HOURS()).map((hh,i)=>i===di?{...hh,[field]:v}:hh); commit(); break; }
    case 'shift': { const v=normTime(t.value); t.value=v; const emp=empById(id); emp.schedule[di]=(emp.schedule[di]||[]).map((x,k)=>k===si?{...x,[field]:v}:x); commit(); break; }
  }
});
// Normalise une saisie d'heure libre vers "HH:MM" (accepte 14, 1400, 14h, 14:0, 9:5, etc.)
function normTime(raw){
  if(raw==null)return '';
  let s=String(raw).trim().toLowerCase().replace('h',':');
  if(s==='')return '';
  const digits=s.replace(/[^0-9]/g,'');
  let hh, mm;
  if(s.includes(':')){
    const p=s.split(':');
    hh=parseInt(p[0],10); mm=parseInt(p[1],10);
    if(isNaN(mm))mm=0;
  } else if(digits.length<=2){
    hh=parseInt(digits,10); mm=0;
  } else if(digits.length===3){
    hh=parseInt(digits.slice(0,1),10); mm=parseInt(digits.slice(1),10);
  } else {
    hh=parseInt(digits.slice(0,2),10); mm=parseInt(digits.slice(2,4),10);
  }
  if(isNaN(hh))return '';
  if(hh>23)hh=23; if(hh<0)hh=0;
  if(isNaN(mm)||mm<0)mm=0; if(mm>59)mm=59;
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
